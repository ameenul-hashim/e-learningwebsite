{% extends 'accounts/base.html' %}

{% block title %}Password Reset Complete - EduStream{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-blue-500/10 border border-slate-100 overflow-hidden">
        <div class="p-10 text-center">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">All <span class="text-blue-600">Set!</span></h1>
            <p class="text-slate-500 font-medium mt-2">Your password has been set. You may go ahead and log in now.</p>
        </div>

        <div class="px-10 pb-10 text-center">
            <a href="{% url 'login' %}" class="w-full inline-block bg-slate-900 text-white rounded-2xl py-4 px-6 text-xs font-black uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl shadow-slate-900/10">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
