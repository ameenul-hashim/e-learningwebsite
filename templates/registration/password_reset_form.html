{% extends 'accounts/base.html' %}

{% block title %}Reset Your Password - EduStream{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-blue-500/10 border border-slate-100 overflow-hidden">
        <div class="p-10 text-center">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Forgot <span class="text-blue-600">Password?</span></h1>
            <p class="text-slate-500 font-medium mt-2">Enter your email and we'll send you a recovery link.</p>
        </div>

        <div class="px-10 pb-10">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" name="email" autocomplete="email" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-slate-900 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold placeholder:text-slate-300" placeholder="student@university.edu">
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white rounded-2xl py-4 px-6 text-xs font-black uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl shadow-slate-900/10 flex items-center justify-center gap-3 group">
                    Send Recovery Link
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="{% url 'login' %}" class="text-[11px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition-colors">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
