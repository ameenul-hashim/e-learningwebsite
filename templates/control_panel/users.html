{% extends 'base.html' %}
{% block content %}
<h1 class="text-4xl font-black mb-12 tracking-tight">User Roster</h1>
<div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-slate-50 border-b">
            <tr><th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student</th><th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th><th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th></tr>
        </thead>
        <tbody class="divide-y">
            {% for u in users %}
            <tr>
                <td class="px-10 py-8"><div class="font-bold">{{ u.first_name }}</div><div class="text-xs text-slate-400">@{{ u.username }}</div></td>
                <td class="px-10 py-8"><span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest {% if u.is_active %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">{{ u.status|upper }}</span></td>
                <td class="px-10 py-8 text-right space-x-2">
                    <a href="{% url 'toggle_user' u.id %}" class="text-[10px] font-black uppercase tracking-widest px-4 py-2 bg-slate-50 rounded-xl hover:bg-slate-900 hover:text-white transition">{% if u.is_active %}Block{% else %}Unblock{% endif %}</a>
                    <a href="{% url 'delete_user' u.id %}" class="text-[10px] font-black uppercase tracking-widest px-4 py-2 bg-red-50 text-red-600 rounded-xl">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
