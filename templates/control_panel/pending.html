{% extends 'base.html' %}
{% block content %}
<h1 class="text-4xl font-black mb-12 tracking-tight">Pending Approval</h1>
<div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-slate-50 border-b">
            <tr><th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student</th><th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Proof</th><th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th></tr>
        </thead>
        <tbody class="divide-y">
            {% for r in reqs %}
            <tr>
                <td class="px-10 py-8"><div class="font-bold">{{ r.first_name }}</div><div class="text-xs text-slate-400">@{{ r.username }}</div></td>
                <td class="px-10 py-8 text-center">{% if r.proof_file %}<a href="{{ r.proof_file.url }}" target="_blank" class="text-xs font-black text-blue-600 underline uppercase tracking-widest">View</a>{% endif %}</td>
                <td class="px-10 py-8 text-right space-x-2">
                    <a href="{% url 'approve_user' r.id %}" class="bg-green-50 text-green-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Approve</a>
                    <a href="{% url 'decline_user' r.id %}" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Decline</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
