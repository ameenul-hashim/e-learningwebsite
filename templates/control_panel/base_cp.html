<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduStream Control Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
            --cp-grad-start: #0f0c29;
            --cp-grad-mid: #302b63;
            --cp-accent: #667eea;
            --cp-accent-warm: #a855f7;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.06);
            z-index: 1000;
            padding-top: 20px;
            overflow-y: auto;
        }

        .sidebar-brand {
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--cp-accent), var(--cp-accent-warm));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .sidebar-link {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(102, 126, 234, 0.1);
            color: white;
            border-left-color: var(--cp-accent);
        }
        .sidebar-link i { margin-right: 12px; font-size: 1.1rem; }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 35px;
            min-height: 100vh;
        }

        .card {
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .stat-card {
            padding: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(102,126,234,0.15);
        }

        .btn-action {
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .table { color: #e2e8f0; }
        .table-hover tbody tr:hover { background: rgba(102,126,234,0.08); }
        .table-light { background: rgba(255,255,255,0.04) !important; color: #94a3b8 !important; }
        .table-light th { background: transparent !important; color: #94a3b8 !important; border-color: rgba(255,255,255,0.06) !important; }
        td, th { border-color: rgba(255,255,255,0.06) !important; }

        .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); border: none; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); border: none; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
        .btn-outline-primary { border-color: var(--cp-accent); color: var(--cp-accent); }
        .btn-outline-primary:hover { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }

        .alert { border-radius: 12px; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-shield-lock-fill"></i> EDUSTREAM CP
        </div>

        <a href="{% url 'cp_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'cp_dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="{% url 'cp_requests' %}" class="sidebar-link {% if request.resolver_match.url_name == 'cp_requests' %}active{% endif %}">
            <i class="bi bi-person-plus"></i> Access Requests
        </a>
        <a href="{% url 'cp_videos' %}" class="sidebar-link {% if request.resolver_match.url_name == 'cp_videos' %}active{% endif %}">
            <i class="bi bi-collection-play"></i> Manage Videos
        </a>
        <a href="{% url 'dashboard' %}" class="sidebar-link">
            <i class="bi bi-arrow-left-circle"></i> Exit to Site
        </a>

        <div style="position: absolute; bottom: 20px; width: 100%;">
            <div class="px-3 mb-2 text-white-50 small">Logged in as: <strong class="text-white">{{ request.user.username }}</strong></div>
            <a href="{% url 'cp_logout' %}" class="sidebar-link text-danger">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
