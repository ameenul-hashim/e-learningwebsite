<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EduStream CP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 45px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
        .brand {
            background: linear-gradient(135deg, #667eea, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .brand-sub {
            color: #94a3b8;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 35px;
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: white !important;
            padding: 14px 16px !important;
            border-radius: 10px !important;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.12) !important;
            color: white !important;
            border-color: #667eea !important;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15) !important;
        }
        .form-control::placeholder { color: #64748b; }
        .btn-cp {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 12px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .btn-cp:hover {
            background: linear-gradient(135deg, #764ba2, #5a3d82);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
            color: white;
        }
        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ff6b7a;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 5;
        }
        .input-icon input {
            padding-left: 42px !important;
        }
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            z-index: 5;
        }
        .toggle-pw:hover { color: #a855f7; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <i class="bi bi-shield-lock-fill"></i> EDUSTREAM
        </div>
        <div class="brand-sub">Control Panel — Secure Access</div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 mb-3">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}

            <div class="mb-3 input-icon">
                <i class="bi bi-person-fill"></i>
                <input type="text" name="username" class="form-control" placeholder="Admin Username" required autofocus>
            </div>

            <div class="mb-4 input-icon">
                <i class="bi bi-key-fill"></i>
                <input type="password" name="password" id="pw" class="form-control" placeholder="Admin Password" required>
                <button type="button" class="toggle-pw" onclick="togglePw()">
                    <i class="bi bi-eye" id="pwIcon"></i>
                </button>
            </div>

            <button type="submit" class="btn btn-cp w-100 mb-3">Authorize Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-white-50 text-decoration-none small">
                <i class="bi bi-arrow-left"></i> Back to EduStream
            </a>
        </div>
    </div>

    <script>
        function togglePw() {
            const pw = document.getElementById('pw');
            const icon = document.getElementById('pwIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>
