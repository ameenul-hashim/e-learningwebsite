{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-900 p-10 rounded-3xl shadow-2xl mt-12 text-white">
    <h1 class="text-3xl font-black mb-2">Admin Portal</h1>
    <p class="text-slate-400 text-sm mb-8">Secure Access Only</p>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Admin Username</label>
            <input type="text" name="username" class="w-full bg-slate-800 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white" required>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Access Key</label>
            <input type="password" name="password" class="w-full bg-slate-800 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-white" required>
        </div>
        <button type="submit" class="w-full bg-white text-slate-900 py-4 rounded-xl font-black hover:bg-slate-100 transition mt-4">AUTHENTICATE</button>
    </form>
</div>
{% endblock %}
