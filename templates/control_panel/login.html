{% extends 'base.html' %}

{% block title %}Admin Login - EduStream{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Admin Portal</h2>
            <p class="mt-2 text-sm text-gray-600">Authorized personnel only</p>
        </div>

        <div class="mt-8 bg-white py-8 px-4 shadow-2xl sm:rounded-3xl sm:px-10 border border-gray-100">
            <form class="space-y-6" method="POST">
                {% csrf_token %}
                
                <div>
                    <label for="id_username" class="block text-sm font-semibold text-gray-700">Admin Username</label>
                    <div class="mt-1">
                        <input id="id_username" name="username" type="text" required 
                               class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                               placeholder="Enter username">
                    </div>
                </div>

                <div class="relative">
                    <label for="id_password" class="block text-sm font-semibold text-gray-700">Access Key</label>
                    <div class="mt-1 relative">
                        <input id="id_password" name="password" type="password" required 
                               class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                               placeholder="••••••••">
                        <button type="button" onclick="togglePassword('id_password')" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <svg id="eye_icon" class="h-5 w-5 text-gray-400 hover:text-blue-600 cursor-pointer" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-slate-900 hover:bg-black focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition duration-150 ease-in-out">
                        Authenticate
                    </button>
                </div>
            </form>
            
            <div class="mt-6">
                <a href="{% url 'login' %}" class="flex items-center justify-center text-xs text-gray-500 hover:text-blue-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 8.25 8.25 0 01-18 0z" />
                    </svg>
                    Return to Student Login
                </a>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
    input.setAttribute('type', type);
}
</script>
{% endblock %}
