{% extends 'base.html' %}

{% block title %}{{ video.title }} - EduStream{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'subject_detail' video.subject.id %}" class="inline-flex items-center text-sm text-blue-600 hover:underline mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to {{ video.subject.name }}
    </a>
    <h1 class="text-3xl font-bold text-gray-900">{{ video.title }}</h1>
</div>

<div class="bg-black rounded-2xl overflow-hidden shadow-2xl aspect-video relative group">
    <iframe 
        src="{{ video.embed_url }}?rel=0&modestbranding=1" 
        class="absolute inset-0 w-full h-full border-0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<div class="mt-8 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
    <h2 class="text-xl font-bold text-gray-900 mb-2">About this Video</h2>
    <p class="text-gray-600">This video is part of the <span class="font-semibold text-blue-600">{{ video.subject.name }}</span> course.</p>
</div>
{% endblock %}
