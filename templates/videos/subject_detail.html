{% extends 'base.html' %}
{% block content %}
<div class="mb-8">
    <a href="{% url 'dashboard' %}" class="text-sm text-blue-600 font-bold mb-2 inline-block">← Back to Library</a>
    <h1 class="text-3xl font-black">{{ subject.name }}</h1>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    {% for video in videos %}
    <div class="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm">
        <div class="aspect-video">
            <iframe class="w-full h-full" src="{{ video.embed_url }}" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="p-6">
            <h3 class="font-bold text-lg">{{ video.title }}</h3>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
