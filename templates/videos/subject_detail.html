{% extends 'base.html' %}
{% block content %}
<div class="mb-12">
    <a href="{% url 'dashboard' %}" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition">← Back to Dashboard</a>
    <h1 class="text-4xl font-black mt-4 tracking-tight">{{ subject.name }}</h1>
</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
    {% for video in subject.videos.all %}
    <div class="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm">
        <div class="aspect-video bg-black">
            <iframe class="w-full h-full" src="{{ video.embed_url }}" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="p-8">
            <span class="text-[10px] font-black uppercase tracking-widest text-blue-500">Lesson {{ forloop.counter }}</span>
            <h3 class="text-xl font-bold mt-1">{{ video.title }}</h3>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
