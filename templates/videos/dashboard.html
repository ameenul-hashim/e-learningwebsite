{% extends 'base.html' %}
{% block content %}
<h1 class="text-4xl font-black mb-12 tracking-tight">Your Courses</h1>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for subject in subjects %}
    <a href="{% url 'subject_detail' subject.id %}" class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-2xl transition transform hover:-translate-y-1 block group">
        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-blue-600 group-hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
        </div>
        <h2 class="text-2xl font-black mb-2">{{ subject.name }}</h2>
        <p class="text-slate-500 text-sm font-medium mb-6">{{ subject.description|truncatechars:80 }}</p>
        <span class="text-[10px] font-black uppercase tracking-widest text-blue-600">Enter Course →</span>
    </a>
    {% endfor %}
</div>
{% endblock %}
