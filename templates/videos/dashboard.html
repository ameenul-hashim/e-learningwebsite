{% extends 'base.html' %}
{% block content %}
<h1 class="text-3xl font-black mb-8">Your Learning Library</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for subject in subjects %}
    <a href="{% url 'subject_detail' subject.id %}" class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition">
        <h2 class="text-xl font-bold mb-2">{{ subject.name }}</h2>
        <p class="text-sm text-slate-500">{{ subject.videos.count }} Lessons available</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
