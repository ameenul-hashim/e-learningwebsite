{% extends 'base.html' %}

{% block title %}Login - EduStream{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
        <p class="text-gray-500 mt-2">Log in to access your learning portal</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            {{ form.username }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            {{ form.password }}
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition transform hover:scale-[1.02] active:scale-100">
            Sign In
        </button>
    </form>

    <div class="mt-8 text-center border-t border-gray-100 pt-6">
        <p class="text-gray-600">New User? <a href="{% url 'signup' %}" class="text-blue-600 font-medium hover:underline">Sign Up</a></p>
    </div>
</div>
{% endblock %}
