{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 mt-12">
    <h1 class="text-4xl font-black mb-8 tracking-tight">Login</h1>
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Username</label>
            <input type="text" name="username" class="w-full bg-slate-50 border rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition" required>
        </div>
        <div class="relative">
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Password</label>
            <input type="password" name="password" id="pw" class="w-full bg-slate-50 border rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition" required>
            <button type="button" onclick="const p=document.getElementById('pw'); p.type=p.type==='password'?'text':'password'" class="absolute right-5 top-11 text-slate-300 hover:text-blue-600 transition">👁️</button>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-blue-700 transition transform hover:scale-[1.02] shadow-xl shadow-blue-100">SIGN IN</button>
    </form>
    <p class="mt-8 text-center text-sm font-bold text-slate-400 uppercase tracking-widest">New? <a href="{% url 'signup' %}" class="text-blue-600 underline">Join Now</a></p>
</div>
{% endblock %}
