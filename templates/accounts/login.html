{% extends 'base.html' %}

{% block title %}Sign In - EduStream{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center p-6 bg-gradient-to-t from-[#0a0f18] to-slate-900">
    <div class="max-w-md w-full">
        <div class="glass p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <!-- Background Glow -->
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-aqua-500/10 rounded-full blur-3xl"></div>

            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-aqua-500/10 border border-aqua-500/20 mb-6">
                    <svg class="w-8 h-8 text-aqua-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-3xl font-black text-white leading-none">Welcome Back</h1>
                <p class="text-slate-500 text-sm mt-3 font-medium">Access your personalized learning list.</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <div class="space-y-2">
                    <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1">Username</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </span>
                        <input type="text" name="username" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white focus:border-aqua-500/50 focus:ring-4 focus:ring-aqua-500/10 transition-all placeholder:text-slate-600" placeholder="your_username">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" id="id_password" name="password" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-12 text-white focus:border-aqua-500/50 focus:ring-4 focus:ring-aqua-500/10 transition-all placeholder:text-slate-600" placeholder="••••••••">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-aqua-400">
                            <svg id="passIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full aqua-gradient text-white font-black py-4 rounded-2xl shadow-xl shadow-aqua-500/20 hover:scale-[1.02] active:scale-95 transition-all text-sm uppercase tracking-widest mt-4">
                    Sign In to Portal
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-white/5 text-center">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Don't have access?</p>
                <a href="{% url 'landing' %}" class="inline-block mt-3 text-aqua-400 font-black uppercase tracking-widest hover:underline text-xs">Request Access Link</a>
            </div>
        </div>
    </div>
</section>

<script>
    function togglePassword() {
        const input = document.getElementById('id_password');
        const icon = document.getElementById('passIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        }
    }
</script>
{% endblock %}
