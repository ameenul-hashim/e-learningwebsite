{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-blue-100 border border-slate-100 overflow-hidden">
        <div class="p-10">
            <h1 class="text-4xl font-black text-slate-900 mb-2">Welcome</h1>
            <p class="text-slate-500 font-medium mb-10">Sign in to continue learning</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Username</label>
                    <input type="text" name="username" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition" required>
                </div>
                <div class="relative">
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Password</label>
                    <input type="password" name="password" id="pass" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition" required>
                    <button type="button" onclick="const p=document.getElementById('pass'); p.type=p.type==='password'?'text':'password'" class="absolute right-5 top-11 text-slate-400 hover:text-blue-600 transition">👁️</button>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-blue-700 shadow-xl shadow-blue-200 transition transform hover:scale-[1.02] active:scale-100">SIGN IN</button>
            </form>
        </div>
        <div class="bg-slate-50 p-8 text-center border-t border-slate-100">
            <p class="text-slate-500 text-sm font-medium">New student? <a href="{% url 'signup' %}" class="text-blue-600 font-black hover:underline">Create Account</a></p>
        </div>
    </div>
</div>
{% endblock %}
