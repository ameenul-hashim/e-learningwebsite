{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-10 rounded-3xl shadow-sm border border-slate-100 mt-12">
    <h1 class="text-3xl font-black mb-6">Join Us</h1>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Full Name</label>
            <input type="text" name="first_name" class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Username</label>
            <input type="text" name="username" class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Email</label>
            <input type="email" name="email" class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Password</label>
            <input type="password" name="password" class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">Create Account</button>
    </form>
    <p class="mt-6 text-center text-sm text-slate-500">Have account? <a href="{% url 'login' %}" class="text-blue-600 font-bold">Log in</a></p>
</div>
{% endblock %}
