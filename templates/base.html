<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 py-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-extrabold text-blue-600 tracking-tighter">EduStream</a>
            <div class="flex items-center gap-6 text-sm font-bold">
                {% if user.is_authenticated %}
                    {% if user.is_staff %}<a href="{% url 'admin_dashboard' %}" class="uppercase tracking-widest text-slate-600">Control Panel</a>{% endif %}
                    <a href="{% url 'logout' %}" class="text-red-500 uppercase tracking-widest">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'signup' %}" class="bg-blue-600 text-white px-5 py-2 rounded-full">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-12">
        {% if messages %}{% for m in messages %}
            <div class="mb-6 p-4 rounded-2xl bg-blue-50 border border-blue-100 text-blue-700 font-bold text-sm">{{ m }}</div>
        {% endfor %}{% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
