<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduStream{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white shadow-sm py-4 mb-8">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-blue-600">EduStream</a>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    {% if user.is_staff %}
                        <a href="{% url 'admin_dashboard' %}" class="text-sm font-bold text-slate-900">Admin Panel</a>
                        <a href="{% url 'admin_logout' %}" class="text-sm text-red-600">Logout</a>
                    {% else %}
                        <a href="{% url 'dashboard' %}" class="text-sm font-bold text-slate-900">Dashboard</a>
                        <a href="{% url 'logout' %}" class="text-sm text-red-600">Logout</a>
                    {% endif %}
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm font-medium">Login</a>
                    <a href="{% url 'signup' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
